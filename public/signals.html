<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Signals & Chart Analysis</title>
    <script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #eee;
            padding: 20px;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }

        .title {
            font-size: 28px;
            font-weight: bold;
            background: linear-gradient(45deg, #00ff88, #00b4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .controls {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        select {
            padding: 8px 12px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid #00b4ff;
            color: #fff;
            border-radius: 5px;
            cursor: pointer;
        }

        button {
            padding: 8px 15px;
            background: #00ff88;
            border: none;
            border-radius: 5px;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        button:hover {
            background: #00cc66;
            transform: scale(1.05);
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 320px;
            gap: 15px;
            margin-bottom: 20px;
        }

        .chart-section {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 10px;
            padding: 15px;
            border: 1px solid rgba(0, 255, 136, 0.1);
        }

        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .chart-title {
            font-size: 18px;
            font-weight: bold;
            color: #00ff88;
        }

        .price-display {
            font-size: 16px;
            font-weight: bold;
            color: #00b4ff;
        }

        #chart {
            width: 100%;
            height: 500px;
        }

        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .panel {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 10px;
            padding: 15px;
            border: 1px solid rgba(0, 255, 136, 0.1);
        }

        .panel-title {
            font-size: 14px;
            font-weight: bold;
            color: #00b4ff;
            margin-bottom: 10px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .stat-item {
            background: rgba(0, 255, 136, 0.05);
            padding: 8px;
            border-radius: 5px;
            border-left: 2px solid #00ff88;
        }

        .stat-label {
            font-size: 11px;
            color: #999;
            text-transform: uppercase;
        }

        .stat-value {
            font-size: 16px;
            font-weight: bold;
            color: #00ff88;
        }

        .signal-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 10px;
            margin: 8px 0;
            border-radius: 5px;
            border-left: 3px solid #00ff88;
            font-size: 12px;
        }

        .signal-item.sell {
            border-left-color: #ff4444;
        }

        .signal-item.buy {
            border-left-color: #00ff88;
        }

        .signal-header {
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            margin-bottom: 3px;
        }

        .signal-type {
            color: #00ff88;
            font-weight: bold;
        }

        .signal-type.sell {
            color: #ff4444;
        }

        .signal-time {
            font-size: 10px;
            color: #999;
        }

        .signal-price {
            font-size: 13px;
            color: #00b4ff;
        }

        .latest-signal {
            background: rgba(0, 255, 136, 0.1);
            padding: 12px;
            border-radius: 5px;
            border: 2px solid #00ff88;
        }

        .latest-signal.sell {
            border-color: #ff4444;
            background: rgba(255, 68, 68, 0.1);
        }

        .bottom-section {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 10px;
            padding: 15px;
            border: 1px solid rgba(0, 255, 136, 0.1);
        }

        .bottom-title {
            font-size: 16px;
            font-weight: bold;
            color: #00ff88;
            margin-bottom: 15px;
        }

        .signals-list {
            max-height: 300px;
            overflow-y: auto;
        }

        .signals-list::-webkit-scrollbar {
            width: 6px;
        }

        .signals-list::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 3px;
        }

        .signals-list::-webkit-scrollbar-thumb {
            background: rgba(0, 255, 136, 0.3);
            border-radius: 3px;
        }

        .signals-list::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 255, 136, 0.5);
        }

        .message {
            padding: 12px;
            border-radius: 5px;
            margin: 8px 0;
            font-size: 13px;
        }

        .message.info {
            background: rgba(0, 180, 255, 0.1);
            border-left: 3px solid #00b4ff;
        }

        .message.success {
            background: rgba(0, 255, 136, 0.1);
            border-left: 3px solid #00ff88;
        }

        .message.error {
            background: rgba(255, 68, 68, 0.1);
            border-left: 3px solid #ff4444;
        }

        @media (max-width: 1024px) {
            .main-grid {
                grid-template-columns: 1fr;
            }

            #chart {
                height: 300px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="title">📊 Trading Signals & Chart Analysis</div>
            <div class="controls">
                <select id="symbolSelect">
                    <option value="BTCUSDT">Bitcoin (BTC)</option>
                    <option value="ETHUSDT">Ethereum (ETH)</option>
                    <option value="BNBUSDT">Binance (BNB)</option>
                    <option value="XRPUSDT">Ripple (XRP)</option>
                </select>
                <button onclick="loadChart()">🔄 Refresh Chart</button>
                <button onclick="loadHistoryModal()">📋 History</button>
            </div>
        </div>

        <div class="main-grid">
            <!-- Chart Section -->
            <div class="chart-section">
                <div class="chart-header">
                    <div class="chart-title">Price Chart with Trading Signals</div>
                    <div class="price-display" id="priceDisplay">Loading...</div>
                </div>
                <div id="chart"></div>
            </div>

            <!-- Sidebar -->
            <div class="sidebar">
                <!-- Latest Signal -->
                <div class="panel">
                    <div class="panel-title">⚡ Latest Signal</div>
                    <div id="latestSignal" class="latest-signal">
                        <div style="text-align: center; color: #999;">Waiting for signals...</div>
                    </div>
                </div>

                <!-- Statistics -->
                <div class="panel">
                    <div class="panel-title">📈 Statistics</div>
                    <div class="stats-grid">
                        <div class="stat-item">
                            <div class="stat-label">Total</div>
                            <div class="stat-value" id="statTotal">0</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-label">Buy</div>
                            <div class="stat-value" id="statBuy" style="color: #00ff88;">0</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-label">Sell</div>
                            <div class="stat-value" id="statSell" style="color: #ff4444;">0</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-label">Win Rate</div>
                            <div class="stat-value" id="statWin" style="color: #00b4ff;">-</div>
                        </div>
                    </div>
                </div>

                <!-- Recent Signals -->
                <div class="panel">
                    <div class="panel-title">🎯 Recent Signals</div>
                    <div id="recentSignals" style="max-height: 150px; overflow-y: auto;">
                        <div style="color: #999; font-size: 12px;">Loading signals...</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Bottom Section - All Signals History -->
        <div class="bottom-section">
            <div class="bottom-title">📊 All Trading Signals History</div>
            <div id="signalsHistory" class="signals-list">
                <div class="message info">Loading signal history...</div>
            </div>
        </div>
    </div>

    <script>
        let chart, candleSeries, markersList = [];
        const symbol = () => document.getElementById('symbolSelect').value;

        // Initialize Chart
        function initChart() {
            const chartContainer = document.getElementById('chart');
            chart = LightweightCharts.createChart(chartContainer, {
                layout: {
                    textColor: '#d1d5db',
                    background: { type: 'solid', color: 'transparent' }
                },
                timeScale: {
                    timeVisible: true,
                    secondsVisible: false,
                    barSpacing: 15,
                },
                rightPriceScale: {
                    textColor: '#d1d5db'
                }
            });

            candleSeries = chart.addCandlestickSeries({
                upColor: '#00ff88',
                downColor: '#ff4444',
                borderUpColor: '#00ff88',
                borderDownColor: '#ff4444',
                wickUpColor: '#00ff88',
                wickDownColor: '#ff4444',
            });

            chart.timeScale().fitContent();
            window.addEventListener('resize', () => chart && chart.applyOptions({ width: chartContainer.clientWidth }));
        }

        // Load Chart Data
        async function loadChart() {
            try {
                const sym = symbol();
                const response = await fetch(`/api/signals-chart/${sym}`);
                
                if (!response.ok) {
                    throw new Error(`API Error: ${response.status} ${response.statusText}`);
                }
                
                const data = await response.json();
                
                if (!data.marketData || !data.marketData.klines) {
                    throw new Error('Invalid market data received');
                }

                // Update price display
                document.getElementById('priceDisplay').textContent = 
                    `$${parseFloat(data.marketData.currentPrice).toLocaleString('en-US', {maximumFractionDigits: 2})}`;

                // Add candles
                const candles = data.marketData.klines.map(k => ({
                    time: Math.floor(new Date(k.time).getTime() / 1000),
                    open: parseFloat(k.open),
                    high: parseFloat(k.high),
                    low: parseFloat(k.low),
                    close: parseFloat(k.close)
                }));

                if (candles.length === 0) {
                    throw new Error('No candle data available');
                }

                candleSeries.setData(candles);

                // Add markers if any signals exist
                if (data.markers && data.markers.length > 0) {
                    markersList = data.markers.map(m => ({
                        time: m.time,
                        position: m.position,
                        color: m.color,
                        shape: m.shape,
                        text: m.text,
                        id: m.id
                    }));
                    candleSeries.setMarkers(markersList);
                } else {
                    candleSeries.setMarkers([]);
                }
                
                chart.timeScale().fitContent();

                // Update statistics
                if (data.stats) {
                    updateStats(data.stats);
                }
                if (data.signals && data.signals.length > 0) {
                    updateLatestSignal(data.signals[0]);
                    updateRecentSignals(data.signals);
                } else {
                    updateLatestSignal(null);
                    updateRecentSignals([]);
                }

            } catch (error) {
                console.error('Error loading chart:', error);
                document.getElementById('priceDisplay').textContent = 'Error loading data';
                showMessage('❌ Error: ' + error.message, 'error');
            }
        }

        // Update Statistics
        function updateStats(stats) {
            document.getElementById('statTotal').textContent = stats.total || 0;
            document.getElementById('statBuy').textContent = stats.buy || 0;
            document.getElementById('statSell').textContent = stats.sell || 0;
            document.getElementById('statWin').textContent = stats.winRate + '%' || '-';
        }

        // Update Latest Signal
        function updateLatestSignal(signal) {
            const container = document.getElementById('latestSignal');
            if (!signal) {
                container.innerHTML = '<div style="text-align: center; color: #999;">No signals yet</div>';
                return;
            }

            const isSignalBuy = signal.signal.toUpperCase() === 'BUY';
            container.innerHTML = `
                <div class="signal-header">
                    <span class="signal-type ${isSignalBuy ? 'buy' : 'sell'}">
                        ${isSignalBuy ? '📈 BUY' : '📉 SELL'}
                    </span>
                    <span class="signal-time">${new Date(signal.timestamp).toLocaleTimeString()}</span>
                </div>
                <div class="signal-price">Price: $${signal.price}</div>
                <div style="font-size: 11px; color: #999; margin-top: 3px;">
                    ${signal.symbol} @ ${signal.timeframe || '1h'}
                </div>
            `;
            container.className = `latest-signal ${isSignalBuy ? 'buy' : 'sell'}`;
        }

        // Update Recent Signals
        function updateRecentSignals(signals) {
            const container = document.getElementById('recentSignals');
            if (!signals || signals.length === 0) {
                container.innerHTML = '<div style="color: #999; font-size: 12px;">No signals yet</div>';
                return;
            }

            container.innerHTML = signals.slice(0, 5).map(s => {
                const isBuy = s.signal.toUpperCase() === 'BUY';
                return `
                    <div class="signal-item ${isBuy ? 'buy' : 'sell'}">
                        <div style="display: flex; justify-content: space-between;">
                            <strong>${isBuy ? '📈 BUY' : '📉 SELL'}</strong>
                            <span style="font-size: 10px; color: #999;">${new Date(s.timestamp).toLocaleTimeString()}</span>
                        </div>
                        <div style="font-size: 12px; color: #00b4ff;">$${s.price}</div>
                    </div>
                `;
            }).join('');
        }

        // Load Signal History
        async function loadSignalHistory() {
            try {
                const sym = symbol();
                const response = await fetch(`/api/signals-history/${sym}?limit=100`);
                
                if (!response.ok) {
                    throw new Error(`API Error: ${response.status}`);
                }
                
                const data = await response.json();

                const container = document.getElementById('signalsHistory');
                if (!data.signals || data.signals.length === 0) {
                    container.innerHTML = '<div class="message info">✅ No signals received yet. Send a test signal to populate the chart.</div>';
                    return;
                }

                container.innerHTML = data.signals.map((s, idx) => {
                    const isBuy = s.signal.toUpperCase() === 'BUY';
                    const date = new Date(s.timestamp);
                    return `
                        <div class="signal-item ${isBuy ? 'buy' : 'sell'}">
                            <div style="display: flex; justify-content: space-between; margin-bottom: 5px;">
                                <strong>${isBuy ? '📈 BUY SIGNAL' : '📉 SELL SIGNAL'}</strong>
                                <span style="font-size: 11px; color: #999;">${date.toLocaleString()}</span>
                            </div>
                            <div style="font-size: 12px;">
                                <span style="color: #00b4ff;">Price:</span> <strong>$${s.price}</strong> | 
                                <span style="color: #00b4ff;">TF:</span> ${s.timeframe || '1h'}
                            </div>
                            <div style="font-size: 11px; color: #999; margin-top: 3px;">
                                RSI: ${s.rsi || '-'} | Signal #${idx + 1}
                            </div>
                        </div>
                    `;
                }).join('');

            } catch (error) {
                console.error('Error loading history:', error);
                document.getElementById('signalsHistory').innerHTML = 
                    '<div class="message error">❌ Error loading signals: ' + error.message + '</div>';
            }
        }

        // Show Message
        function showMessage(text, type = 'info') {
            const msg = document.createElement('div');
            msg.className = `message ${type}`;
            msg.textContent = text;
            document.getElementById('signalsHistory').prepend(msg);
            setTimeout(() => msg.remove(), 3000);
        }

        // Modal for history (if needed later)
        function loadHistoryModal() {
            alert('📋 Signal History - Full details available in the "All Trading Signals History" section below');
        }

        // Event Listeners
        document.getElementById('symbolSelect').addEventListener('change', loadChart);

        // Initialize on load
        window.addEventListener('load', () => {
            console.log('Page loaded, initializing chart...');
            try {
                initChart();
                console.log('Chart initialized');
                loadChart();
                loadSignalHistory();
                // Refresh every 30 seconds
                setInterval(() => {
                    loadChart();
                    loadSignalHistory();
                }, 30000);
            } catch (error) {
                console.error('Initialization error:', error);
                const container = document.getElementById('chart');
                if (container) {
                    container.innerHTML = `<div style="padding: 20px; color: red;">❌ Error initializing chart: ${error.message}</div>`;
                }
            }
        });
    </script>
</body>
</html>
